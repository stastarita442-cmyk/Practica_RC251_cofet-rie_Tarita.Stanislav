=<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>404 – Pagina nu a fost găsită</title>

  <!-- Favicon Pack -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <meta name="theme-color" content="#060612" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />

<body>

  <!-- Fundal animat -->
  <div class="bg-grid"></div>
  <div class="orb orb--red"></div>

    <div class="badge">EROARE DE SERVER</div>

    <div class="code-wrap">
      <span class="code" aria-hidden="true">404</span>
      <span class="code code--ghost" aria-hidden="true">404</span>
    </div>

    <h1 class="title">Pagina nu există</h1>

    <p class="desc">
      Resursa solicitată a fost mutată, ștearsă<br />
      sau adresa introdusă este incorectă.
    </p>

    <div class="actions">
      <a href="/" class="btn btn--primary">← Pagina principală</a>
      <a href="javascript:history.back()" class="btn btn--ghost">Înapoi</a>
    </div>

    <div class="meta">
      <span class="pulse"></span>
      <code>HTTP 404 · Not Found</code>
    </div>

  </main>
